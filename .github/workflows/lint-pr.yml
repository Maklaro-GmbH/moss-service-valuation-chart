name: 'Lint PR'

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review

jobs:
  main:
    name: Validate Pull Request Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        if: github.event.pull_request.draft == false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
